<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>280Z Rider V2</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}
canvas{display:block;touch-action:none}
.btn{position:fixed;right:15px;width:80px;height:80px;border-radius:50%;
background:rgba(255,255,255,.25);color:#fff;font-size:30px;
display:flex;align-items:center;justify-content:center}
#acc{bottom:110px} #brk{bottom:15px}
#restart{position:fixed;top:15px;left:15px;display:none;padding:10px}
</style>
</head>
<body>
<canvas id="g"></canvas>
<div id="acc" class="btn">▲</div>
<div id="brk" class="btn">▼</div>
<button id="restart">Reiniciar</button>
<script>
const c=document.getElementById('g'),ctx=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight} rs(); onresize=rs;

let speed=80,targetSpeed=80,km=0,dead=false;
let bikeX=0,targetBikeX=0;
let acc=false,br=false;

const cars=[];
function spawn(){
 cars.length=0;
 for(let i=0;i<4;i++){
   cars.push({
     lane:(Math.random()*2-1)*0.9,
     z:1800+i*1000,
     color:["#d22","#06c","#fff","#999","#222"][Math.floor(Math.random()*5)]
   });
 }
}
spawn();

function reset(){
 speed=80; targetSpeed=80; km=0; dead=false;
 bikeX=0; targetBikeX=0;
 document.getElementById("restart").style.display="none";
 spawn();
}

function drawCar(x,y,s,color){
 ctx.fillStyle=color;
 ctx.fillRect(x-s/2,y-s*0.8,s,s*1.6);
 ctx.fillStyle="#88c";
 ctx.fillRect(x-s*0.32,y-s*0.55,s*0.64,s*0.4);
 ctx.fillStyle="#ffea00";
 ctx.fillRect(x-s*0.42,y+s*0.45,s*0.12,s*0.08);
 ctx.fillRect(x+s*0.30,y+s*0.45,s*0.12,s*0.08);
}

function loop(){
 requestAnimationFrame(loop);
 const w=c.width,h=c.height;

 bikeX += (targetBikeX-bikeX)*0.22;

 ctx.fillStyle="#87CEEB";
 ctx.fillRect(0,0,w,h);
 ctx.fillStyle="#4b9b4b";
 ctx.fillRect(0,h*0.45,w,h);

 // árboles simples
 for(let i=0;i<8;i++){
   let yy=h*0.5+i*60;
   ctx.fillStyle="#6b3f1f";
   ctx.fillRect(20,yy,8,18);
   ctx.fillRect(w-28,yy,8,18);
   ctx.fillStyle="green";
   ctx.beginPath();ctx.arc(24,yy,16,0,7);ctx.fill();
   ctx.beginPath();ctx.arc(w-24,yy,16,0,7);ctx.fill();
 }

 for(let y=h*0.45;y<h;y+=2){
   let p=(y-h*0.45)/(h*0.55);
   let rw=120+p*w*0.82;
   ctx.fillStyle="#444";
   ctx.fillRect(w/2-rw/2,y,rw,2);

   if(((y+km/4)%70)<35){
     ctx.fillStyle="#fff";
     ctx.fillRect(w/2-rw/6,y,4,2);
     ctx.fillRect(w/2+rw/6,y,4,2);
   }
 }

 let hit=false;

 cars.forEach(car=>{
   if(!dead) car.z -= speed/4.5;
   if(car.z<0){
      car.z=5000;
      car.lane=(Math.random()*2-1)*0.9;
   }

   let p=1-car.z/5500;
   if(p<=0) return;

   let roadW=120+p*w*0.82;
   let cx=w/2 + car.lane*(roadW*0.38);
   let cy=h*0.45 + p*h*0.5;
   let s=25+p*95;

   drawCar(cx,cy,s,car.color);

   let bikeScreenX=w/2+bikeX*220;
   if(p>0.94 && Math.abs(cx-bikeScreenX)<55){
      hit=true;
   }
 });

 // moto estilo 280z
 let bx=w/2+bikeX*220;
 let lean=(targetBikeX-bikeX)*35;

 ctx.save();
 ctx.translate(bx,h-95);
 ctx.rotate(lean*Math.PI/180);

 ctx.strokeStyle="#111";
 ctx.lineWidth=12;
 ctx.beginPath();
 ctx.moveTo(-95,-20); ctx.lineTo(95,-20);
 ctx.stroke();

 ctx.fillStyle="#d8a07a";
 ctx.fillRect(-130,-55,45,70);
 ctx.fillRect(85,-55,45,70);

 ctx.fillStyle="#111";
 ctx.beginPath(); ctx.arc(0,20,55,0,7); ctx.fill();

 ctx.fillStyle="#c00";
 ctx.fillRect(-45,-10,90,28);

 ctx.restore();

 ctx.fillStyle="#fff";
 ctx.font="22px Arial";
 ctx.fillText(Math.floor(speed)+" km/h",bx-45,h-55);
 ctx.fillText("KM "+Math.floor(km/100),15,30);

 if(hit && !dead){
   dead=true; speed=0; targetSpeed=0;
   document.getElementById("restart").style.display="block";
 }

 if(dead){
   ctx.fillStyle="red";
   ctx.font="bold 42px Arial";
   ctx.fillText("CHOQUE",w/2-90,h/2);
 }

 if(!dead){
   if(acc) targetSpeed=Math.min(220,targetSpeed+1.4);
   if(br) targetSpeed=Math.max(20,targetSpeed-2);
   speed += (targetSpeed-speed)*0.08;
   km += speed/15;
 }
}
loop();

c.addEventListener("touchstart",e=>{
 targetBikeX=((e.touches[0].clientX/c.width)-0.5)*2.2;
});
c.addEventListener("touchmove",e=>{
 targetBikeX=((e.touches[0].clientX/c.width)-0.5)*2.2;
 targetBikeX=Math.max(-1.2,Math.min(1.2,targetBikeX));
 e.preventDefault();
});

document.getElementById("acc").ontouchstart=()=>acc=true;
document.getElementById("acc").ontouchend=()=>acc=false;
document.getElementById("brk").ontouchstart=()=>br=true;
document.getElementById("brk").ontouchend=()=>br=false;
document.getElementById("restart").onclick=reset;
</script>
</body></html>
