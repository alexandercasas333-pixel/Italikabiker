<!DOCTYPE html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>280Z Rider V6</title>
<style>
body{margin:0;overflow:hidden;background:#000}canvas{display:block;touch-action:none}
.btn{position:fixed;right:15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px}
#acc{bottom:110px}#brk{bottom:15px}
#restart{position:fixed;top:10px;left:10px;z-index:10;display:none}
</style></head><body>
<canvas id="c"></canvas>
<div id="acc" class="btn">▲</div><div id="brk" class="btn">▼</div>
<button id="restart">Reiniciar</button>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;

let speed=80,targetSpeed=80,dead=false;
let bikeX=0,targetBikeX=0,dragging=false,km=0;
let acc=false,br=false;

const lanes=[-1,0,1];
const cars=[];
function spawn(){
 cars.length=0;
 for(let i=0;i<4;i++) cars.push({lane:lanes[Math.floor(Math.random()*3)],z:2500+i*2200,color:["#d22","#06c","#fff","#777"][i%4]});
}
spawn();

const AC=window.AudioContext?new AudioContext():null;
let osc;
function startAudio(){
 if(!AC||osc) return;
 osc=AC.createOscillator();
 let g=AC.createGain();
 osc.type="sawtooth";
 osc.connect(g); g.connect(AC.destination);
 g.gain.value=.02;
 osc.start();
}
function beep(freq,dur){
 if(!AC)return;
 const o=AC.createOscillator(),g=AC.createGain();
 o.frequency.value=freq;o.connect(g);g.connect(AC.destination);
 g.gain.value=.05;o.start();o.stop(AC.currentTime+dur);
}

function drawCar(cx,cy,s,col){
 x.fillStyle=col;
 x.fillRect(cx-s/2,cy-s*.8,s,s*1.6);
 x.fillStyle="#9cf"; x.fillRect(cx-s*.3,cy-s*.55,s*.6,s*.28);
 x.fillStyle="#222"; x.fillRect(cx-s*.35,cy-s*.15,s*.7,s*.2);
 x.fillStyle="#ff0";
 x.fillRect(cx-s*.42,cy+s*.42,s*.1,s*.07);
 x.fillRect(cx+s*.32,cy+s*.42,s*.1,s*.07);
}

function loop(){
 requestAnimationFrame(loop);

 bikeX += (targetBikeX-bikeX)*0.22;

 x.fillStyle="#87ceeb";x.fillRect(0,0,c.width,c.height);
 x.fillStyle="#4fa04f";x.fillRect(0,c.height*.32,c.width,c.height);

 for(let y=c.height*.32;y<c.height;y+=2){
   let p=(y-c.height*.32)/(c.height*.68);
   let rw=220+p*c.width*1.15;
   x.fillStyle="#444";x.fillRect(c.width/2-rw/2,y,rw,2);
   x.fillStyle="#fff";
   x.fillRect(c.width/2-rw/3,y,3,2);
   x.fillRect(c.width/2+rw/3,y,3,2);
 }

 let hit=false;

 cars.forEach(car=>{
   if(!dead) car.z-=speed/4;
   if(car.z<0){
      car.z=9000;
      car.lane=lanes[Math.floor(Math.random()*3)];
   }
   let p=1-car.z/10000;
   if(p<=0) return;

   let rw=220+p*c.width*1.15;
   let laneWidth=rw/3;
   let cx=c.width/2 + car.lane*(laneWidth*0.65);
   let cy=c.height*.32+p*c.height*.6;
   let s=25+p*110;

   drawCar(cx,cy,s,car.color);

   let bikeScreenX=c.width/2+bikeX*320;
   if(p>.96 && Math.abs(cx-bikeScreenX)<65) hit=true;
 });

 let bx=c.width/2+bikeX*320;
 let lean=(targetBikeX-bikeX)*20;

 x.save();
 x.translate(bx,c.height-100);
 x.rotate(lean*Math.PI/180);
 x.strokeStyle="#111";x.lineWidth=12;
 x.beginPath();x.moveTo(-120,-25);x.lineTo(120,-25);x.stroke();
 x.fillStyle="#d8a07a";x.fillRect(-145,-60,45,70);x.fillRect(100,-60,45,70);
 x.fillStyle="#111";x.beginPath();x.arc(0,15,65,0,7);x.fill();
 x.fillStyle="#c00";x.fillRect(-60,-15,120,35);
 x.fillStyle="#333";x.fillRect(-25,-55,50,20);
 x.restore();

 x.fillStyle="#fff";
 x.font="22px Arial";
 x.fillText(Math.floor(speed)+" km/h",15,30);
 x.fillText("KM "+Math.floor(km/100),15,60);

 if(hit&&!dead){
   dead=true;speed=0;targetSpeed=0;
   restart.style.display='block';
   beep(120,0.3);
 }

 if(!dead){
   if(acc) targetSpeed=Math.min(240,targetSpeed+1.2);
   if(br) targetSpeed=Math.max(20,targetSpeed-2);
   speed+=(targetSpeed-speed)*0.08;
   km+=speed/15;
   if(osc) osc.frequency.value=80+speed*2;
 }
}

loop();

c.addEventListener('touchstart',e=>{
 dragging=true;
 startAudio();
 if(AC&&AC.state==="suspended") AC.resume();
});
c.addEventListener('touchend',()=>dragging=false);
c.addEventListener('touchmove',e=>{
 if(!dragging) return;
 targetBikeX=((e.touches[0].clientX/c.width)-0.5)*2;
 targetBikeX=Math.max(-1.2,Math.min(1.2,targetBikeX));
 e.preventDefault();
});

acc.onpointerdown=()=>{acc=true;startAudio();};
acc.onpointerup=()=>acc=false;
brk.onpointerdown=()=>br=true;
brk.onpointerup=()=>br=false;

restart.onclick=()=>{
 dead=false;speed=80;targetSpeed=80;
 restart.style.display='none';
 spawn();
};
</script></body></html>
